<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0d10"/>
      <stop offset="1" stop-color="#161c25"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7cf3a0"/>
      <stop offset="1" stop-color="#6aa9ff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- subtle grid -->
  <g stroke="#1a2230" stroke-width="1" opacity="0.6">
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="510" x2="1200" y2="510"/>
  </g>
  <!-- accent bar -->
  <rect x="80" y="180" width="80" height="6" fill="url(#accent)" rx="3"/>
  <!-- emoji + kicker -->
  <text x="80" y="155" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="28" fill="#8a94a3" letter-spacing="3">A FREE, SELF-DIRECTED CURRICULUM</text>
  <!-- title -->
  <text x="80" y="290" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="78" font-weight="700" fill="#e8ecf1" letter-spacing="-1">The Free Fractional CTO</text>
  <text x="80" y="380" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="78" font-weight="700" fill="url(#accent)" letter-spacing="-1">90-Day Blueprint</text>
  <!-- subtitle -->
  <text x="80" y="450" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="28" fill="#cfd6df">Attract → Convert → Serve. Built from free resources.</text>
  <!-- footer chips -->
  <g font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="22" fill="#8a94a3">
    <rect x="80" y="540" width="170" height="44" rx="22" fill="#13171c" stroke="#222831"/>
    <text x="165" y="569" text-anchor="middle">~3–5 hrs/week</text>
    <rect x="270" y="540" width="170" height="44" rx="22" fill="#13171c" stroke="#222831"/>
    <text x="355" y="569" text-anchor="middle">Progress tracker</text>
    <rect x="460" y="540" width="180" height="44" rx="22" fill="#13171c" stroke="#222831"/>
    <text x="550" y="569" text-anchor="middle">⭐ Non-negotiables</text>
  </g>
  <!-- compass emoji big right -->
  <text x="1100" y="380" font-size="320" text-anchor="middle">🧭</text>
</svg>
